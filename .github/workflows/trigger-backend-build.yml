name: Trigger Backend Docker Build

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - '.github/workflows/**'

jobs:
  trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Wait before dispatching backend build
        run: sleep 180

      - name: Check for recent backend builds
        id: recent_backend_build
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BACKEND_DISPATCH_TOKEN }}
          script: |
            const owner = 'lopiv2';
            const repo = 'invenicum_backend';
            const workflow_id = 'docker-publish.yml';
            const branch = 'main';
            const now = Date.now();
            const windowMs = 3 * 60 * 1000;

            const { data } = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id,
              branch,
              per_page: 10,
            });

            const recentRun = data.workflow_runs.find((run) => {
              if (['completed', 'cancelled', 'failure', 'timed_out', 'action_required', 'neutral', 'skipped', 'stale', 'startup_failure'].includes(run.conclusion)) {
                return false;
              }

              const createdAt = new Date(run.created_at).getTime();
              return now - createdAt <= windowMs;
            });

            if (recentRun) {
              core.info(`Skipping dispatch because backend workflow run ${recentRun.id} already exists with status ${recentRun.status}.`);
              core.setOutput('should_dispatch', 'false');
              return;
            }

            core.setOutput('should_dispatch', 'true');

      - name: Dispatch build to backend repo
        if: steps.recent_backend_build.outputs.should_dispatch == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BACKEND_DISPATCH_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'lopiv2',
              repo: 'invenicum_backend',
              workflow_id: 'docker-publish.yml',
              ref: 'main'
            });
            console.log('Backend build triggered successfully.');

      - name: Skip duplicate backend dispatch
        if: steps.recent_backend_build.outputs.should_dispatch != 'true'
        run: echo "Recent backend build detected. Skipping dispatch."
